name: Deploy LumiConnect to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Inject GAS URL into Config
        run: |
          if [ -z "${{ secrets.GAS_APP_URL }}" ]; then
            echo "⚠️ WARNING: GAS_APP_URL secret not set. App will run in demo mode."
          else
            echo "✅ Injecting GAS_APP_URL into config..."
            sed -i "s|%%GAS_APP_URL%%|${{ secrets.GAS_APP_URL }}|g" assets/js/config.js
            echo "✅ GAS URL injected successfully."
          fi

      - name: 📝 Create 404 fallback page
        run: cp index.html 404.html

      - name: 🔒 Verify no secrets are exposed in output
        run: |
          if grep -r "%%GAS_APP_URL%%" assets/js/config.js 2>/dev/null; then
            echo "⚠️ GAS_APP_URL placeholder not replaced. Running in DEMO mode."
          else
            echo "✅ Config injection verified."
          fi

      - name: 📦 Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Deployment Complete
        run: |
          echo "🌐 LumiConnect deployed!"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"
